blueprint:
  name: Timeslot Light Control v1.9
  description: >
    # 💡 Timeslot Light Control

    **Version: 1.9** · [GitHub](https://github.com/Somberland/HomeAssistant-Blueprints) · Autor: Phil Skorpil


    Steuere deine Lichter mit Zeitfenstern, Fade-In/Fade-Out und flexibler Lichteinstellung.


    **Funktionen:**

    - **Trigger:** Binary Sensor (z. B. Bewegungsmelder) oder Schedule (Zeitplan)
    - **Lichter:** Auswahl über Entities, Areas oder Devices
    - **Standard-Einstellung:** 24h-Fallback wenn kein Zeitfenster aktiv ist
    - **Zeitfenster (Timeslots):** Bis zu 5 konfigurierbare Zeitfenster mit individueller Helligkeit, Farbtemperatur oder RGB-Farbe
    - **Helligkeitssensor (Lux):** Optionale Lux-basierte Steuerung – Licht nur bei Dunkelheit + automatischer Helligkeits-Boost
    - **Fade-In / Fade-Out:** Optionale sanfte Übergänge beim Ein- und Ausschalten


    **So funktioniert es:**

    1. Wähle einen Trigger (Binary Sensor oder Schedule).
    2. Wähle die Lichter aus.
    3. Optional: Konfiguriere bis zu 5 Zeitfenster mit individuellen Lichteinstellungen.
    4. Optional: Aktiviere Fade-In und/oder Fade-Out.
    5. Optional: Konfiguriere einen Lux-Sensor für helligkeitsabhängige Steuerung.


    Wenn der Trigger aktiv wird, wird geprüft, welches Zeitfenster gerade aktiv ist und die entsprechenden Lichteinstellungen werden angewendet.
    Wenn kein Zeitfenster aktiv ist, wird die Standard-Einstellung verwendet (sofern aktiviert).


    **💡 Tipp – Lücken zwischen Zeitfenstern:**
    Wenn die Standard-Einstellung deaktiviert ist und keine Zeitfenster aktiv sind,
    wird der Trigger ignoriert und das Licht nicht eingeschaltet.
    Das lässt sich gezielt als **Sperrzeit** nutzen – z. B. tagsüber keine Bewegungssteuerung.


    Required = *

  domain: automation
  source_url: https://github.com/Somberland/HomeAssistant-Blueprints
  input:
    # ─────────────────────────────────────────────
    # TRIGGER
    # ─────────────────────────────────────────────
    trigger_settings:
      name: "🎯 Trigger *"
      icon: mdi:motion-sensor
      collapsed: false
      input:
        trigger_entity:
          name: Trigger – Binary Sensor oder Schedule *
          description: >
            Wähle einen oder mehrere **Binary Sensors** (z. B. Bewegungsmelder, Türkontakt) oder
            einen **Schedule** (Zeitplan-Helfer) als Auslöser für die Lichtsteuerung.


            - **Binary Sensor → ON:** Licht einschalten
            - **Binary Sensor → OFF:** Licht ausschalten
            - **Schedule → ON:** Licht einschalten
            - **Schedule → OFF:** Licht ausschalten
          default: []
          selector:
            entity:
              filter:
                domain:
                  - binary_sensor
                  - schedule
              multiple: true

        trigger_off_delay:
          name: Verzögerung beim Ausschalten (Sekunden)
          description: >
            Wie lange soll das Licht noch brennen, nachdem der Trigger inaktiv wird (z. B. keine Bewegung mehr)?
            Bei Schedule-Trigger wird dies ignoriert.
          default: 0
          selector:
            number:
              min: 0
              max: 3600
              step: 1
              unit_of_measurement: seconds
              mode: slider

    # ─────────────────────────────────────────────
    # LICHTER
    # ─────────────────────────────────────────────
    light_settings:
      name: "💡 Lichter *"
      icon: mdi:lightbulb-group-outline
      collapsed: false
      input:
        light_targets:
          name: Lichter – Entities, Areas oder Devices *
          description: >
            Wähle die Lichter aus, die gesteuert werden sollen.
            Du kannst einzelne **Entitäten**, **Bereiche (Areas)** oder **Geräte (Devices)** auswählen.
          selector:
            target:
              entity:
                domain: light

    # ─────────────────────────────────────────────
    # FADE IN / FADE OUT
    # ─────────────────────────────────────────────
    fade_settings:
      name: "🌅 Fade In / Fade Out (Optional)"
      icon: mdi:transition
      collapsed: true
      input:
        use_fade_in:
          name: Fade-In aktivieren
          description: >
            Wenn aktiviert, werden die Lichter sanft eingeblendet (Übergang von 0 auf die Ziel-Helligkeit).
          default: false
          selector:
            boolean:

        fade_in_duration:
          name: Fade-In Dauer (Sekunden)
          description: >
            Wie lange soll das Einblenden dauern? (z. B. 5 Sekunden)
          default: 5
          selector:
            number:
              min: 1
              max: 60
              step: 1
              unit_of_measurement: seconds
              mode: slider

        use_fade_out:
          name: Fade-Out aktivieren
          description: >
            Wenn aktiviert, werden die Lichter sanft ausgeblendet (Übergang von aktueller Helligkeit auf 0).
          default: false
          selector:
            boolean:

        fade_out_duration:
          name: Fade-Out Dauer (Sekunden)
          description: >
            Wie lange soll das Ausblenden dauern? (z. B. 5 Sekunden)
          default: 5
          selector:
            number:
              min: 1
              max: 60
              step: 1
              unit_of_measurement: seconds
              mode: slider

    # ─────────────────────────────────────────────
    # AUSSCHALTEN
    # ─────────────────────────────────────────────
    turnoff_settings:
      name: "🔴 Ausschalten (Optional)"
      icon: mdi:lightbulb-off-outline
      collapsed: true
      input:
        reset_brightness_on_off:
          name: Helligkeit vor Ausschalten zurücksetzen
          description: >
            Setzt die Helligkeit direkt vor dem Ausschalten auf den konfigurierten Wert zurück (transition: 0).
            So startet die Lampe beim nächsten **manuellen** Einschalten wieder auf der gewünschten Helligkeit –
            und nicht auf 1% wenn zuvor ein Fade-Out aktiv war.
          default: true
          selector:
            boolean:

        reset_brightness_value:
          name: Helligkeit nach Reset (%)
          description: >
            Auf welche Helligkeit soll vor dem Ausschalten zurückgesetzt werden?
          default: 100
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

    # ─────────────────────────────────────────────
    # HELLIGKEITSSENSOR (LUX)
    # ─────────────────────────────────────────────
    lux_settings:
      name: "☀️ Helligkeitssensor / Lux (Optional)"
      icon: mdi:brightness-5
      collapsed: true
      input:
        lux_enabled:
          name: Helligkeitssensor aktivieren
          description: >
            Wenn aktiviert, wird der Lux-Sensor zur Steuerung genutzt.
            Das Licht schaltet sich nur ein wenn der Raum/Bereich dunkel genug ist.
            Außerdem kann die Helligkeit bei sehr niedrigen Lux-Werten automatisch erhöht werden.
          default: false
          selector:
            boolean:

        lux_sensor:
          name: Helligkeitssensor (Lux)
          description: >
            Wähle einen Helligkeitssensor (Illuminance) aus.
            Nur relevant wenn "Helligkeitssensor aktivieren" eingeschaltet ist.
          default: []
          selector:
            entity:
              filter:
                domain: sensor
                device_class: illuminance

        lux_max_threshold:
          name: Max. Helligkeit zum Einschalten (Lux)
          description: >
            Das Licht schaltet sich **nur ein wenn der Lux-Wert unter diesem Schwellenwert liegt**.
            Ist es heller als dieser Wert, wird der Trigger ignoriert – das Licht ist nicht nötig.


            Typische Richtwerte: 100–300 lx (dämmrig bis leicht hell)
          default: 200
          selector:
            number:
              min: 0
              max: 2000
              step: 10
              unit_of_measurement: lx
              mode: slider

        lux_boost_enabled:
          name: Helligkeits-Boost bei Dunkelheit aktivieren
          description: >
            Wenn aktiviert, wird die konfigurierte Slot-Helligkeit automatisch erhöht
            sobald der Lux-Wert unter den Boost-Schwellenwert fällt.
            Nützlich wenn z. B. nachts mehr Licht gewünscht ist als tagsüber im gleichen Zeitfenster.
          default: false
          selector:
            boolean:

        lux_boost_threshold:
          name: Boost-Schwellenwert (Lux)
          description: >
            Unterhalb dieses Lux-Werts wird der Helligkeits-Boost angewendet.


            Typische Richtwerte: 10–50 lx (dunkel bis sehr dunkel)
          default: 30
          selector:
            number:
              min: 0
              max: 500
              step: 5
              unit_of_measurement: lx
              mode: slider

        lux_boost_amount:
          name: Boost-Betrag (%)
          description: >
            Um wie viel Prozent soll die Helligkeit erhöht werden wenn der Boost aktiv ist?
            Die resultierende Helligkeit wird auf maximal 100% begrenzt.
          default: 30
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

    # ─────────────────────────────────────────────
    # DEFAULT / FALLBACK (kein Zeitfenster aktiv)
    # ─────────────────────────────────────────────
    default_settings:
      name: "🌟 Standard-Einstellung (Fallback / 24h)"
      icon: mdi:clock-check-outline
      collapsed: false
      input:
        default_enabled:
          name: Standard-Einstellung aktivieren
          description: >
            Wenn aktiviert und kein Zeitfenster gerade aktiv ist, wird diese Einstellung verwendet.
            Das Licht reagiert dann rund um die Uhr auf den Trigger – solange kein Zeitfenster greift.
          default: true
          selector:
            boolean:

        default_brightness:
          name: Standard-Helligkeit (%)
          default: 100
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        default_color_mode:
          name: Standard-Farbmodus
          default: "none"
          selector:
            select:
              options:
                - label: Farbtemperatur (Kelvin)
                  value: "color_temp"
                - label: RGB-Farbe
                  value: "rgb"
                - label: Nur Helligkeit (keine Farbe)
                  value: "none"

        default_color_temp:
          name: Standard-Farbtemperatur (Kelvin)
          default: 4000
          selector:
            number:
              min: 2000
              max: 6500
              step: 100
              unit_of_measurement: "K"
              mode: slider

        default_rgb_color:
          name: Standard-RGB-Farbe
          default: [255, 255, 255]
          selector:
            color_rgb:

    # ─────────────────────────────────────────────
    # ZEITFENSTER 1
    # ─────────────────────────────────────────────
    timeslot_1:
      name: "⏰ Zeitfenster 1 (Optional)"
      icon: mdi:clock-time-one-outline
      collapsed: true
      input:
        ts1_enabled:
          name: Zeitfenster 1 aktivieren
          default: false
          selector:
            boolean:

        ts1_start:
          name: Startzeit
          description: Startzeit des Zeitfensters (z. B. 06:00)
          default: "06:00:00"
          selector:
            time:

        ts1_end:
          name: Endzeit
          description: Endzeit des Zeitfensters (z. B. 09:00)
          default: "09:00:00"
          selector:
            time:

        ts1_brightness:
          name: Helligkeit (%)
          description: Helligkeit der Lichter in diesem Zeitfenster (1–100 %)
          default: 80
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        ts1_color_mode:
          name: Farbmodus
          description: Wähle, ob du Farbtemperatur oder eine RGB-Farbe verwenden möchtest.
          default: "color_temp"
          selector:
            select:
              options:
                - label: Farbtemperatur (Kelvin)
                  value: "color_temp"
                - label: RGB-Farbe
                  value: "rgb"
                - label: Nur Helligkeit (keine Farbe)
                  value: "none"

        ts1_color_temp:
          name: Farbtemperatur (Kelvin)
          description: Farbtemperatur in Kelvin (z. B. 2700 = warm, 5000 = kalt/neutral)
          default: 3000
          selector:
            number:
              min: 2000
              max: 6500
              step: 100
              unit_of_measurement: "K"
              mode: slider

        ts1_rgb_color:
          name: RGB-Farbe
          description: Farbe des Lichts in diesem Zeitfenster (nur wenn Farbmodus = RGB)
          default: [255, 200, 100]
          selector:
            color_rgb:

    # ─────────────────────────────────────────────
    # ZEITFENSTER 2
    # ─────────────────────────────────────────────
    timeslot_2:
      name: "⏰ Zeitfenster 2 (Optional)"
      icon: mdi:clock-time-two-outline
      collapsed: true
      input:
        ts2_enabled:
          name: Zeitfenster 2 aktivieren
          default: false
          selector:
            boolean:

        ts2_start:
          name: Startzeit
          default: "09:00:00"
          selector:
            time:

        ts2_end:
          name: Endzeit
          default: "12:00:00"
          selector:
            time:

        ts2_brightness:
          name: Helligkeit (%)
          default: 100
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        ts2_color_mode:
          name: Farbmodus
          default: "color_temp"
          selector:
            select:
              options:
                - label: Farbtemperatur (Kelvin)
                  value: "color_temp"
                - label: RGB-Farbe
                  value: "rgb"
                - label: Nur Helligkeit (keine Farbe)
                  value: "none"

        ts2_color_temp:
          name: Farbtemperatur (Kelvin)
          default: 5000
          selector:
            number:
              min: 2000
              max: 6500
              step: 100
              unit_of_measurement: "K"
              mode: slider

        ts2_rgb_color:
          name: RGB-Farbe
          default: [255, 255, 255]
          selector:
            color_rgb:

    # ─────────────────────────────────────────────
    # ZEITFENSTER 3
    # ─────────────────────────────────────────────
    timeslot_3:
      name: "⏰ Zeitfenster 3 (Optional)"
      icon: mdi:clock-time-three-outline
      collapsed: true
      input:
        ts3_enabled:
          name: Zeitfenster 3 aktivieren
          default: false
          selector:
            boolean:

        ts3_start:
          name: Startzeit
          default: "12:00:00"
          selector:
            time:

        ts3_end:
          name: Endzeit
          default: "17:00:00"
          selector:
            time:

        ts3_brightness:
          name: Helligkeit (%)
          default: 100
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        ts3_color_mode:
          name: Farbmodus
          default: "none"
          selector:
            select:
              options:
                - label: Farbtemperatur (Kelvin)
                  value: "color_temp"
                - label: RGB-Farbe
                  value: "rgb"
                - label: Nur Helligkeit (keine Farbe)
                  value: "none"

        ts3_color_temp:
          name: Farbtemperatur (Kelvin)
          default: 4000
          selector:
            number:
              min: 2000
              max: 6500
              step: 100
              unit_of_measurement: "K"
              mode: slider

        ts3_rgb_color:
          name: RGB-Farbe
          default: [255, 255, 255]
          selector:
            color_rgb:

    # ─────────────────────────────────────────────
    # ZEITFENSTER 4
    # ─────────────────────────────────────────────
    timeslot_4:
      name: "⏰ Zeitfenster 4 (Optional)"
      icon: mdi:clock-time-four-outline
      collapsed: true
      input:
        ts4_enabled:
          name: Zeitfenster 4 aktivieren
          default: false
          selector:
            boolean:

        ts4_start:
          name: Startzeit
          default: "17:00:00"
          selector:
            time:

        ts4_end:
          name: Endzeit
          default: "22:00:00"
          selector:
            time:

        ts4_brightness:
          name: Helligkeit (%)
          default: 70
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        ts4_color_mode:
          name: Farbmodus
          default: "color_temp"
          selector:
            select:
              options:
                - label: Farbtemperatur (Kelvin)
                  value: "color_temp"
                - label: RGB-Farbe
                  value: "rgb"
                - label: Nur Helligkeit (keine Farbe)
                  value: "none"

        ts4_color_temp:
          name: Farbtemperatur (Kelvin)
          default: 3500
          selector:
            number:
              min: 2000
              max: 6500
              step: 100
              unit_of_measurement: "K"
              mode: slider

        ts4_rgb_color:
          name: RGB-Farbe
          default: [255, 180, 80]
          selector:
            color_rgb:

    # ─────────────────────────────────────────────
    # ZEITFENSTER 5
    # ─────────────────────────────────────────────
    timeslot_5:
      name: "⏰ Zeitfenster 5 (Optional)"
      icon: mdi:clock-time-five-outline
      collapsed: true
      input:
        ts5_enabled:
          name: Zeitfenster 5 aktivieren
          default: false
          selector:
            boolean:

        ts5_start:
          name: Startzeit
          default: "22:00:00"
          selector:
            time:

        ts5_end:
          name: Endzeit
          default: "23:59:00"
          selector:
            time:

        ts5_brightness:
          name: Helligkeit (%)
          default: 20
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        ts5_color_mode:
          name: Farbmodus
          default: "color_temp"
          selector:
            select:
              options:
                - label: Farbtemperatur (Kelvin)
                  value: "color_temp"
                - label: RGB-Farbe
                  value: "rgb"
                - label: Nur Helligkeit (keine Farbe)
                  value: "none"

        ts5_color_temp:
          name: Farbtemperatur (Kelvin)
          default: 2200
          selector:
            number:
              min: 2000
              max: 6500
              step: 100
              unit_of_measurement: "K"
              mode: slider

        ts5_rgb_color:
          name: RGB-Farbe
          default: [255, 100, 30]
          selector:
            color_rgb:


# ─────────────────────────────────────────────
# TRIGGER DEFINITION
# ─────────────────────────────────────────────
triggers:
  - trigger: state
    entity_id: !input trigger_entity
    to: "on"
    id: "trigger_on"
  - trigger: state
    entity_id: !input trigger_entity
    to: "off"
    for:
      seconds: !input trigger_off_delay
    id: "trigger_off"

# ─────────────────────────────────────────────
# VARIABLEN
# ─────────────────────────────────────────────
variables:
  # Zeitfenster-Eingaben
  ts1_enabled: !input ts1_enabled
  ts1_start: !input ts1_start
  ts1_end: !input ts1_end
  ts1_brightness: !input ts1_brightness
  ts1_color_mode: !input ts1_color_mode
  ts1_color_temp: !input ts1_color_temp
  ts1_rgb_color: !input ts1_rgb_color

  ts2_enabled: !input ts2_enabled
  ts2_start: !input ts2_start
  ts2_end: !input ts2_end
  ts2_brightness: !input ts2_brightness
  ts2_color_mode: !input ts2_color_mode
  ts2_color_temp: !input ts2_color_temp
  ts2_rgb_color: !input ts2_rgb_color

  ts3_enabled: !input ts3_enabled
  ts3_start: !input ts3_start
  ts3_end: !input ts3_end
  ts3_brightness: !input ts3_brightness
  ts3_color_mode: !input ts3_color_mode
  ts3_color_temp: !input ts3_color_temp
  ts3_rgb_color: !input ts3_rgb_color

  ts4_enabled: !input ts4_enabled
  ts4_start: !input ts4_start
  ts4_end: !input ts4_end
  ts4_brightness: !input ts4_brightness
  ts4_color_mode: !input ts4_color_mode
  ts4_color_temp: !input ts4_color_temp
  ts4_rgb_color: !input ts4_rgb_color

  ts5_enabled: !input ts5_enabled
  ts5_start: !input ts5_start
  ts5_end: !input ts5_end
  ts5_brightness: !input ts5_brightness
  ts5_color_mode: !input ts5_color_mode
  ts5_color_temp: !input ts5_color_temp
  ts5_rgb_color: !input ts5_rgb_color

  # Lux-Einstellungen
  lux_enabled: !input lux_enabled
  lux_sensor: !input lux_sensor
  lux_max_threshold: !input lux_max_threshold
  lux_boost_enabled: !input lux_boost_enabled
  lux_boost_threshold: !input lux_boost_threshold
  lux_boost_amount: !input lux_boost_amount

  # Aktueller Lux-Wert (9999 wenn Sensor deaktiviert → kein Sperren)
  lux_value: >-
    {%- if lux_enabled -%}{{ states(lux_sensor) | float(9999) }}{%- else -%}9999{%- endif -%}

  # Lux erlaubt das Einschalten?
  lux_allows_on: >-
    {{ not lux_enabled or lux_value | float(9999) <= lux_max_threshold }}

  # Default/Fallback-Einstellungen
  default_enabled: !input default_enabled
  default_brightness: !input default_brightness
  default_color_mode: !input default_color_mode
  default_color_temp: !input default_color_temp
  default_rgb_color: !input default_rgb_color

  # Fade-Einstellungen
  use_fade_in: !input use_fade_in
  fade_in_duration: !input fade_in_duration
  use_fade_out: !input use_fade_out
  fade_out_duration: !input fade_out_duration
  reset_brightness_on_off: !input reset_brightness_on_off
  reset_brightness_value: !input reset_brightness_value

  # Aktuell aktives Zeitfenster ermitteln (0 = keins aktiv)
  # Unterstützt auch mitternachts-übergreifende Fenster (z. B. 23:00–08:00):
  # Wenn start > end → Fenster geht über Mitternacht → t >= start ODER t < end
  active_slot: >-
    {%- set t = now().strftime('%H:%M:%S') -%}
    {%- macro in_slot(en, s, e) -%}
      {%- if en -%}
        {%- if s <= e -%}{{ s <= t < e }}{%- else -%}{{ t >= s or t < e }}{%- endif -%}
      {%- else -%}False{%- endif -%}
    {%- endmacro -%}
    {%- if in_slot(ts1_enabled, ts1_start, ts1_end) == 'True' -%}1
    {%- elif in_slot(ts2_enabled, ts2_start, ts2_end) == 'True' -%}2
    {%- elif in_slot(ts3_enabled, ts3_start, ts3_end) == 'True' -%}3
    {%- elif in_slot(ts4_enabled, ts4_start, ts4_end) == 'True' -%}4
    {%- elif in_slot(ts5_enabled, ts5_start, ts5_end) == 'True' -%}5
    {%- else -%}0{%- endif -%}

  active_brightness: >-
    {%- set s = active_slot | int -%}
    {%- if s == 1 -%}{{ ts1_brightness }}
    {%- elif s == 2 -%}{{ ts2_brightness }}
    {%- elif s == 3 -%}{{ ts3_brightness }}
    {%- elif s == 4 -%}{{ ts4_brightness }}
    {%- elif s == 5 -%}{{ ts5_brightness }}
    {%- else -%}{{ default_brightness }}{%- endif -%}

  active_color_mode: >-
    {%- set s = active_slot | int -%}
    {%- if s == 1 -%}{{ ts1_color_mode }}
    {%- elif s == 2 -%}{{ ts2_color_mode }}
    {%- elif s == 3 -%}{{ ts3_color_mode }}
    {%- elif s == 4 -%}{{ ts4_color_mode }}
    {%- elif s == 5 -%}{{ ts5_color_mode }}
    {%- else -%}{{ default_color_mode }}{%- endif -%}

  active_color_temp: >-
    {%- set s = active_slot | int -%}
    {%- if s == 1 -%}{{ ts1_color_temp }}
    {%- elif s == 2 -%}{{ ts2_color_temp }}
    {%- elif s == 3 -%}{{ ts3_color_temp }}
    {%- elif s == 4 -%}{{ ts4_color_temp }}
    {%- elif s == 5 -%}{{ ts5_color_temp }}
    {%- else -%}{{ default_color_temp }}{%- endif -%}

  active_rgb_color: >-
    {%- set s = active_slot | int -%}
    {%- if s == 1 -%}{{ ts1_rgb_color }}
    {%- elif s == 2 -%}{{ ts2_rgb_color }}
    {%- elif s == 3 -%}{{ ts3_rgb_color }}
    {%- elif s == 4 -%}{{ ts4_rgb_color }}
    {%- elif s == 5 -%}{{ ts5_rgb_color }}
    {%- else -%}{{ default_rgb_color }}{%- endif -%}

  # Endgültige Helligkeit: Slot/Default + optionaler Lux-Boost (max 100%)
  final_brightness: >-
    {%- set base = active_brightness | int -%}
    {%- if lux_enabled and lux_boost_enabled and lux_value | float(9999) <= lux_boost_threshold -%}
      {{ [base + lux_boost_amount | int, 100] | min }}
    {%- else -%}
      {{ base }}
    {%- endif -%}

# ─────────────────────────────────────────────
# AKTIONEN
# ─────────────────────────────────────────────
actions:
  - choose:
      # ── LICHT EINSCHALTEN (Trigger ON) ────────
      - conditions:
          - condition: trigger
            id: "trigger_on"
          - condition: template
            value_template: "{{ (active_slot | int > 0 or default_enabled) and lux_allows_on }}"
        sequence:
          # Fade-In: Licht erst auf 1% setzen, dann hochdimmen
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ use_fade_in }}"
                sequence:
                  # Schritt 1: Licht bei 1% einschalten (kein Übergang)
                  - action: light.turn_on
                    target: !input light_targets
                    data:
                      brightness_pct: 1
                      transition: 0
                  # Kurze Pause
                  - delay:
                      milliseconds: 200
                  # Schritt 2: Auf Zielhelligkeit einblenden (mit Fade-Dauer)
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ active_color_mode == 'color_temp' }}"
                        sequence:
                          - action: light.turn_on
                            target: !input light_targets
                            data:
                              brightness_pct: "{{ final_brightness | int }}"
                              color_temp_kelvin: "{{ active_color_temp | int }}"
                              transition: "{{ fade_in_duration | int }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ active_color_mode == 'rgb' }}"
                        sequence:
                          - action: light.turn_on
                            target: !input light_targets
                            data:
                              brightness_pct: "{{ final_brightness | int }}"
                              rgb_color: "{{ active_rgb_color }}"
                              transition: "{{ fade_in_duration | int }}"
                    default:
                      - action: light.turn_on
                        target: !input light_targets
                        data:
                          brightness_pct: "{{ final_brightness | int }}"
                          transition: "{{ fade_in_duration | int }}"
            # Kein Fade-In: Direkt einschalten
            default:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ active_color_mode == 'color_temp' }}"
                    sequence:
                      - action: light.turn_on
                        target: !input light_targets
                        data:
                          brightness_pct: "{{ final_brightness | int }}"
                          kelvin: "{{ active_color_temp | int }}"
                          transition: 1
                  - conditions:
                      - condition: template
                        value_template: "{{ active_color_mode == 'rgb' }}"
                    sequence:
                      - action: light.turn_on
                        target: !input light_targets
                        data:
                          brightness_pct: "{{ final_brightness | int }}"
                          rgb_color: "{{ active_rgb_color }}"
                          transition: 1
                default:
                  - action: light.turn_on
                    target: !input light_targets
                    data:
                      brightness_pct: "{{ final_brightness | int }}"
                      transition: 1

      # ── LICHT AUSSCHALTEN (Trigger OFF) ───────
      - conditions:
          - condition: trigger
            id: "trigger_off"
        sequence:
          - choose:
              # Fade-Out: Erst auf 1% dimmen, dann ausschalten
              - conditions:
                  - condition: template
                    value_template: "{{ use_fade_out }}"
                sequence:
                  # Schritt 1: Auf 1% ausblenden
                  - action: light.turn_on
                    target: !input light_targets
                    data:
                      brightness_pct: 1
                      transition: "{{ fade_out_duration | int }}"
                  # Warten bis Fade-Out abgeschlossen
                  - delay:
                      seconds: "{{ fade_out_duration | int }}"
                  # Schritt 2: Optional Helligkeit zurücksetzen (für nächstes manuelles Einschalten)
                  - if:
                      - condition: template
                        value_template: "{{ reset_brightness_on_off }}"
                    then:
                      - action: light.turn_on
                        target: !input light_targets
                        data:
                          brightness_pct: "{{ reset_brightness_value | int }}"
                          transition: 0
                  # Schritt 3: Licht ausschalten
                  - action: light.turn_off
                    target: !input light_targets
                    data:
                      transition: 0
            # Kein Fade-Out: Optional Helligkeit zurücksetzen, dann ausschalten
            default:
              - if:
                  - condition: template
                    value_template: "{{ reset_brightness_on_off }}"
                then:
                  - action: light.turn_on
                    target: !input light_targets
                    data:
                      brightness_pct: "{{ reset_brightness_value | int }}"
                      transition: 0
              - action: light.turn_off
                target: !input light_targets
                data:
                  transition: 0

mode: restart
max_exceeded: silent
